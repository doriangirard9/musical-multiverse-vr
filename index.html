<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wam Jam Party</title>
    <link rel="stylesheet" href="/src/ui/styles.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e; /* Match theme background */
        }
        #renderCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Send to back */
            outline: none;
        }
        #app-root {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas by default */
            z-index: 10;
        }
        #app-root > * {
            pointer-events: auto; /* Re-enable clicks for UI overlays */
        }
        #log {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-height: 150px;
            overflow-y: scroll;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
            z-index: 5;
            pointer-events: none;
        }
        .log-entry {
            margin-bottom: 5px;
        }
        .log-entry.log {
            color: white;
        }
        .log-entry.error {
            color: red;
        }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="app-root"></div>
    <div id="log"></div>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
